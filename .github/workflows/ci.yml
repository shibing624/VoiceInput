name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Pillow
        run: pip3 install Pillow --break-system-packages

      - name: Build
        run: swift build -c release

      - name: Build app bundle
        run: make build PYTHON=python3
